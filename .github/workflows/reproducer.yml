name: Run Reproducer
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - local-matrix
          - saas

jobs:
  # Single run (local or saas)
  reproduce:
    if: inputs.mode != 'local-matrix'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Zeebe (local only)
        if: inputs.mode == 'local'
        run: docker compose up -d

      - name: Wait for Zeebe to be ready (local only)
        if: inputs.mode == 'local'
        run: |
          echo "Waiting for Zeebe to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9600/actuator/health/readiness > /dev/null 2>&1; then
              echo "Zeebe is ready after ~$((i*2))s"
              exit 0
            fi
            echo "  waiting... ($i/60)"
            sleep 2
          done
          echo "Zeebe did not become ready in time"
          docker compose logs zeebe
          exit 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build
        run: mvn compile -q

      - name: Run reproducer (2 minutes)
        run: mvn exec:java 2>&1 | tee reproducer-output.txt
        env:
          CAMUNDA_CLIENT_CLOUD_CLUSTERID: ${{ inputs.mode == 'saas' && secrets.CAMUNDA_CLIENT_CLOUD_CLUSTERID || '' }}
          CAMUNDA_CLIENT_CLOUD_REGION: ${{ inputs.mode == 'saas' && secrets.CAMUNDA_CLIENT_CLOUD_REGION || '' }}
          ZEEBE_CLIENT_ID: ${{ inputs.mode == 'saas' && secrets.ZEEBE_CLIENT_ID || '' }}
          ZEEBE_CLIENT_SECRET: ${{ inputs.mode == 'saas' && secrets.ZEEBE_CLIENT_SECRET || '' }}
          ZEEBE_AUTHORIZATION_SERVER_URL: ${{ inputs.mode == 'saas' && secrets.ZEEBE_AUTHORIZATION_SERVER_URL || '' }}

      - name: Check for DEADLINE_EXCEEDED warnings
        run: |
          echo "=== Checking for DEADLINE_EXCEEDED log pollution ==="
          count=$(grep -c "io.grpc.StatusRuntimeException: DEADLINE_EXCEEDED" reproducer-output.txt || true)
          echo "Found $count DEADLINE_EXCEEDED warnings in 2 minutes"
          if [ "$count" -gt 0 ]; then
            echo "\u2717 Bug confirmed: idle job worker produced $count DEADLINE_EXCEEDED warnings"
            echo ""
            echo "=== Sample output ==="
            grep -B1 -A2 "io.grpc.StatusRuntimeException: DEADLINE_EXCEEDED" reproducer-output.txt | head -15
            exit 1
          else
            echo "\u2713 No DEADLINE_EXCEEDED warnings observed"
          fi

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reproducer-output
          path: reproducer-output.txt

      - name: Stop Zeebe (local only)
        if: always() && inputs.mode == 'local'
        run: docker compose down

  # Matrix run: 10 combinations of client/server timeouts
  # The gRPC DEADLINE_OFFSET for ActivateJobs is hardcoded to 10s.
  # gRPC deadline = requestTimeout + 10s.
  # When requestTimeout=0: gateway uses its own longPollingTimeout -> easy to trigger.
  # When requestTimeout>0: gateway uses client's value -> 10s buffer -> hard to trigger.
  reproduce-matrix:
    if: inputs.mode == 'local-matrix'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- requestTimeout=0: gateway falls back to its longPollingTimeout ---
          # gRPC deadline = 0 + 10s = 10s. Bug if server longPollingTimeout > 10s.
          #  1: deadline 10s, server 15s -> server 5s over -> BUG
          - client_timeout: 0
            server_timeout: 15000
            expect_bug: true
          #  2: deadline 10s, server 20s -> server 10s over -> BUG
          - client_timeout: 0
            server_timeout: 20000
            expect_bug: true
          #  3: deadline 10s, server 30s -> server 20s over -> BUG
          - client_timeout: 0
            server_timeout: 30000
            expect_bug: true
          #  4: deadline 10s, server 12s -> server 2s over -> BUG
          - client_timeout: 0
            server_timeout: 12000
            expect_bug: true
          #  5: deadline 10s, server 8s  -> client 2s over -> NO BUG
          - client_timeout: 0
            server_timeout: 8000
            expect_bug: false
          #  6: deadline 10s, server 5s  -> client 5s over -> NO BUG
          - client_timeout: 0
            server_timeout: 5000
            expect_bug: false
          # --- requestTimeout>0: gateway uses client's value, 10s buffer ---
          # gRPC deadline = requestTimeout + 10s. Gateway holds for requestTimeout.
          # The 10s DEADLINE_OFFSET buffer should prevent DEADLINE_EXCEEDED.
          #  7: client 10s -> deadline 20s, gateway holds 10s -> 10s buffer -> NO BUG
          - client_timeout: 10
            server_timeout: 30000
            expect_bug: false
          #  8: client 5s  -> deadline 15s, gateway holds 5s  -> 10s buffer -> NO BUG
          - client_timeout: 5
            server_timeout: 30000
            expect_bug: false
          #  9: client 15s -> deadline 25s, gateway holds 15s -> 10s buffer -> NO BUG
          - client_timeout: 15
            server_timeout: 30000
            expect_bug: false
          # 10: client 1s  -> deadline 11s, gateway holds 1s  -> 10s buffer -> NO BUG
          - client_timeout: 1
            server_timeout: 30000
            expect_bug: false

    name: "client=${{ matrix.client_timeout }}s server=${{ matrix.server_timeout }}ms (expect_bug=${{ matrix.expect_bug }})"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print timeout configuration
        run: |
          CLIENT=${{ matrix.client_timeout }}
          SERVER=${{ matrix.server_timeout }}
          DEADLINE=$((CLIENT + 10))
          SERVER_S=$((SERVER / 1000))
          echo "### Timeout Configuration"
          echo "Client requestTimeout:         ${CLIENT}s"
          echo "gRPC DEADLINE_OFFSET:          10s (hardcoded in ActivateJobsCommandImpl)"
          echo "Effective gRPC deadline:       ${DEADLINE}s"
          echo "Server long-polling timeout:   ${SERVER_S}s (${SERVER}ms)"
          if [ "$CLIENT" -eq 0 ]; then
            echo "\u2192 requestTimeout=0: gateway uses its own longPollingTimeout (${SERVER_S}s)"
            if [ "$SERVER_S" -gt "$DEADLINE" ]; then
              echo "\u2192 Server (${SERVER_S}s) > gRPC deadline (${DEADLINE}s) \u2192 EXPECT DEADLINE_EXCEEDED"
            else
              echo "\u2192 Server (${SERVER_S}s) \u2264 gRPC deadline (${DEADLINE}s) \u2192 expect NO warnings"
            fi
          else
            echo "\u2192 requestTimeout=${CLIENT}s: gateway uses client's value as hold time"
            echo "\u2192 10s DEADLINE_OFFSET buffer should prevent DEADLINE_EXCEEDED"
          fi

      - name: Start Zeebe
        run: docker compose up -d
        env:
          LONGPOLLING_TIMEOUT: ${{ matrix.server_timeout }}

      - name: Wait for Zeebe to be ready
        run: |
          echo "Waiting for Zeebe to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9600/actuator/health/readiness > /dev/null 2>&1; then
              echo "Zeebe is ready after ~$((i*2))s"
              exit 0
            fi
            echo "  waiting... ($i/60)"
            sleep 2
          done
          echo "Zeebe did not become ready in time"
          docker compose logs zeebe
          exit 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build
        run: mvn compile -q

      - name: Run reproducer (60s)
        run: mvn exec:java 2>&1 | tee reproducer-output.txt
        env:
          CLIENT_REQUEST_TIMEOUT_S: ${{ matrix.client_timeout }}
          RUN_DURATION_S: "60"

      - name: Check for DEADLINE_EXCEEDED warnings
        run: |
          count=$(grep -c "io.grpc.StatusRuntimeException: DEADLINE_EXCEEDED" reproducer-output.txt || true)
          CLIENT=${{ matrix.client_timeout }}
          SERVER=${{ matrix.server_timeout }}
          DEADLINE=$((CLIENT + 10))
          SERVER_S=$((SERVER / 1000))
          echo "### Result: client=${CLIENT}s (deadline=${DEADLINE}s) vs server=${SERVER_S}s"
          echo "DEADLINE_EXCEEDED count: $count"
          if [ "$count" -gt 0 ]; then
            echo "\u2717 Bug triggered: $count DEADLINE_EXCEEDED warnings"
            grep -B1 -A1 "io.grpc.StatusRuntimeException: DEADLINE_EXCEEDED" reproducer-output.txt | head -10
          else
            echo "\u2713 No DEADLINE_EXCEEDED warnings"
          fi
          # Fail only when result doesn't match expectation
          if [ "${{ matrix.expect_bug }}" = "true" ] && [ "$count" -eq 0 ]; then
            echo "UNEXPECTED: expected bug but no warnings observed"
            exit 1
          fi
          if [ "${{ matrix.expect_bug }}" = "false" ] && [ "$count" -gt 0 ]; then
            echo "UNEXPECTED: did not expect bug but warnings were observed"
            exit 1
          fi
          echo "Result matches expectation."

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "output-client${{ matrix.client_timeout }}s-server${{ matrix.server_timeout }}ms"
          path: reproducer-output.txt

      - name: Stop Zeebe
        if: always()
        run: docker compose down

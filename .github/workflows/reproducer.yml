name: Run Reproducer
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - saas

jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Zeebe (local only)
        if: inputs.mode == 'local'
        run: docker compose up -d

      - name: Wait for Zeebe to be ready (local only)
        if: inputs.mode == 'local'
        run: |
          echo "Waiting for Zeebe to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9600/actuator/health/readiness > /dev/null 2>&1; then
              echo "Zeebe is ready after ~$((i*2))s"
              exit 0
            fi
            echo "  waiting... ($i/60)"
            sleep 2
          done
          echo "Zeebe did not become ready in time"
          docker compose logs zeebe
          exit 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build
        run: mvn compile -q

      - name: Run reproducer (2 minutes)
        run: mvn exec:java 2>&1 | tee reproducer-output.txt
        env:
          # SaaS credentials (only used when mode=saas, set as repository secrets)
          ZEEBE_CLIENT_CLOUD_CLUSTER_ID: ${{ inputs.mode == 'saas' && secrets.ZEEBE_CLIENT_CLOUD_CLUSTER_ID || '' }}
          ZEEBE_CLIENT_CLOUD_REGION: ${{ inputs.mode == 'saas' && secrets.ZEEBE_CLIENT_CLOUD_REGION || '' }}
          ZEEBE_CLIENT_ID: ${{ inputs.mode == 'saas' && secrets.ZEEBE_CLIENT_ID || '' }}
          ZEEBE_CLIENT_SECRET: ${{ inputs.mode == 'saas' && secrets.ZEEBE_CLIENT_SECRET || '' }}

      - name: Check for DEADLINE_EXCEEDED warnings
        run: |
          echo "=== Checking for DEADLINE_EXCEEDED log pollution ==="
          count=$(grep -c "StatusRuntimeException: DEADLINE_EXCEEDED" reproducer-output.txt || true)
          echo "Found $count DEADLINE_EXCEEDED warnings in 2 minutes"
          if [ "$count" -gt 0 ]; then
            echo "✗ Bug confirmed: idle job worker produced $count DEADLINE_EXCEEDED warnings"
            echo ""
            echo "=== Sample output ==="
            grep -A2 "StatusRuntimeException: DEADLINE_EXCEEDED" reproducer-output.txt | head -10
            exit 1
          else
            echo "✓ No DEADLINE_EXCEEDED warnings observed"
          fi

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reproducer-output
          path: reproducer-output.txt

      - name: Stop Zeebe (local only)
        if: always() && inputs.mode == 'local'
        run: docker compose down

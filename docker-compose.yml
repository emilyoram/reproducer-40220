# Reproducer for camunda/camunda#40220
# Zeebe with gRPC long-polling enabled (default) and a long-polling timeout
# configured to exceed the client's gRPC deadline, triggering DEADLINE_EXCEEDED.
services:
  zeebe:
    image: camunda/zeebe:8.6.7
    container_name: zeebe-40220
    ports:
      - "26500:26500"
      - "9600:9600"
    environment:
      - ZEEBE_BROKER_GATEWAY_LONGPOLLING_ENABLED=true
      # Set long-polling timeout to 30s. The Zeebe Java client's gRPC deadline
      # is requestTimeout (10s) + DEADLINE_OFFSET (10s) = 20s.
      # The gateway holds 10s longer than the client deadline, guaranteeing
      # the client times out first and logs DEADLINE_EXCEEDED.
      - ZEEBE_BROKER_GATEWAY_LONGPOLLING_TIMEOUT=30000
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9600' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

# Reproducer for camunda/camunda#40220
# Zeebe with gRPC long-polling enabled (default).
#
# Key insight: The gRPC DEADLINE_OFFSET for ActivateJobs is hardcoded to 10s in both
# the old zeebe-client-java and the new camunda-client-java. When the client sets
# requestTimeout=0, the gateway falls back to its own longPollingTimeout. If that
# exceeds 10s (the DEADLINE_OFFSET), the client times out with DEADLINE_EXCEEDED.
services:
  zeebe:
    image: camunda/zeebe:8.6.7
    container_name: zeebe-40220
    ports:
      - "26500:26500"
      - "9600:9600"
    environment:
      - ZEEBE_BROKER_GATEWAY_LONGPOLLING_ENABLED=true
      # Server longPollingTimeout. Default: 15s (must exceed 10s DEADLINE_OFFSET).
      # When client sends requestTimeout=0, gateway uses this as the hold time.
      # gRPC deadline = 0 + 10s = 10s. Server holds for 15s -> DEADLINE_EXCEEDED.
      - ZEEBE_BROKER_GATEWAY_LONGPOLLING_TIMEOUT=${LONGPOLLING_TIMEOUT:-15000}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9600' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
